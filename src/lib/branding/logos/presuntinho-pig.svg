<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Presuntinho — porquinho rosa">
  <title>Presuntinho — Porquinho fofo</title>
  <!--
    Variante (a) — Porquinho rosa fofo.
    Pendente CEO: confirmar se quer carinha completa ou só silhueta simples.
    Paleta coerente com src/app.css: --accent #ec4899, --accent-hover #db2777, --bg #1f2e4a.
    viewBox 0 0 64 64 — escala fluida para 32×32 ou 512×512 sem perda.
  -->
  <!-- orelhas (atrás do corpo) -->
  <path d="M18 16 L23 10 L26 18 Z" fill="#f9a8d4" stroke="#db2777" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M46 16 L41 10 L38 18 Z" fill="#f9a8d4" stroke="#db2777" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- corpo redondo (cabeça) -->
  <circle cx="32" cy="34" r="20" fill="#fbcfe8" stroke="#ec4899" stroke-width="1.6"/>
  <!-- focinho saliente -->
  <ellipse cx="32" cy="40" rx="9" ry="7" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <!-- narinas -->
  <ellipse cx="29" cy="40" rx="1.2" ry="1.8" fill="#db2777"/>
  <ellipse cx="35" cy="40" rx="1.2" ry="1.8" fill="#db2777"/>
  <!-- olhos -->
  <circle cx="25" cy="30" r="1.8" fill="#1f2e4a"/>
  <circle cx="39" cy="30" r="1.8" fill="#1f2e4a"/>
  <!-- brilho nos olhos -->
  <circle cx="25.8" cy="29.4" r="0.55" fill="#ffffff"/>
  <circle cx="39.8" cy="29.4" r="0.55" fill="#ffffff"/>
  <!-- sorriso discreto -->
  <path d="M28 45 Q32 48 36 45" fill="none" stroke="#db2777" stroke-width="1.2" stroke-linecap="round"/>
  <!-- mancha da testa (roseta) -->
  <circle cx="32" cy="22" r="2.2" fill="#db2777" opacity="0.55"/>
</svg>
