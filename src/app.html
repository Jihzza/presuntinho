<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f2e4a" />
    <meta name="description" content="Presuntinho — Equivalenza Study Hub. Estudo, trabalhos, finanças, hábitos e biblioteca numa só PWA." />
    <meta name="color-scheme" content="dark light" />
    <!-- iOS/standalone PWA polish -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Presuntinho" />
    <!-- Apply the saved theme BEFORE first paint so a reload never flashes
         back to the default dark theme (theme choice mirrors to
         localStorage 'fat-theme'; Dexie hydration catches up later). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('fat-theme') || 'auto';
          var root = document.documentElement;
          if (t === 'auto') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          root.classList.add('theme-' + t);
          root.setAttribute('data-theme', t);
        } catch (e) {
          /* localStorage unavailable — keep default theme */
        }
      })();
    </script>
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <!-- Ícone da app escolhido (V10.5): aplicar ANTES do primeiro paint.
         O Chrome/WebAPK lê o link do manifest no fim do page-load e não o
         relê se mudar depois — o espelho 'fat-app-logo' (localStorage,
         escrito por src/lib/app-logo.ts; Dexie é a fonte de verdade) torna
         a troca síncrona, como o 'fat-theme' acima. -->
    <script>
      (function () {
        try {
          var logo = localStorage.getItem('fat-app-logo');
          if (!logo || logo === 'classico' || !/^[a-z-]{2,24}$/.test(logo)) return;
          var m = document.querySelector('link[rel="manifest"]');
          if (m) m.href = '/manifests/logo-' + logo + '.webmanifest';
          var a = document.querySelector('link[rel="apple-touch-icon"]');
          if (a) a.href = '/logos/' + logo + '/icon-180.png';
        } catch (e) {
          /* localStorage indisponível — o hook do layout aplica mais tarde */
        }
      })();
    </script>

    <!-- Open Graph defaults (overridden per-route via <svelte:head>). -->
    <meta property="og:site_name" content="Presuntinho" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_PT" />
    <meta property="og:image" content="%sveltekit.assets%/icons/icon-512.png" />

    <!-- Twitter card defaults. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="%sveltekit.assets%/icons/icon-512.png" />

    <title>Presuntinho — Study Hub</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
