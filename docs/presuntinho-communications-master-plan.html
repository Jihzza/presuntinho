&lt;body&gt;
&lt;main class=&quot;plan-shell&quot; id=&quot;presuntinho-communications-plan&quot;&gt;
  &lt;header class=&quot;hero&quot;&gt;
    &lt;div class=&quot;hero-copy&quot;&gt;
      &lt;p class=&quot;eyebrow&quot;&gt;Presuntinho · Comunicações v2&lt;/p&gt;
      &lt;h1&gt;Plano mestre de mensagens e chamadas&lt;/h1&gt;
      &lt;p class=&quot;lede&quot;&gt;Um plano executável para transformar a conversa do casal numa experiência fiável, expressiva e honesta — com estados confirmados por dispositivo, chamadas WebRTC resilientes, notificações observáveis e uma interface que nunca deixa ninguém sem resposta.&lt;/p&gt;
      &lt;div class=&quot;hero-badges&quot; aria-label=&quot;Estado do plano&quot;&gt;
        &lt;span class=&quot;badge goal&quot;&gt;Goal ativo&lt;/span&gt;
        &lt;span class=&quot;badge danger&quot;&gt;Backend em produção + preview verde · merge, TURN e device lab pendentes&lt;/span&gt;
        &lt;span class=&quot;badge neutral&quot;&gt;Atualizado 15 jul 2026&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;aside class=&quot;north-star&quot; aria-label=&quot;Objetivo principal&quot;&gt;
      &lt;span class=&quot;north-icon&quot; aria-hidden=&quot;true&quot;&gt;♥&lt;/span&gt;
      &lt;strong&gt;Regra de ouro&lt;/strong&gt;
      &lt;p&gt;“A tocar” só aparece depois de um dispositivo da outra pessoa confirmar que apresentou a chamada. Um push aceite pelo servidor não é um telefone a tocar.&lt;/p&gt;
    &lt;/aside&gt;
  &lt;/header&gt;

  &lt;nav class=&quot;jump-nav&quot; aria-label=&quot;Índice do plano&quot;&gt;
    &lt;a href=&quot;#diagnostico&quot;&gt;Diagnóstico&lt;/a&gt;

    &lt;a href=&quot;#testes&quot;&gt;Testes&lt;/a&gt;

      &lt;span class=&quot;metric&quot; id=&quot;done-count&quot;&gt;25&lt;/span&gt;

    &lt;/article&gt;
    &lt;article&gt;
      &lt;span class=&quot;metric&quot; id=&quot;todo-count&quot;&gt;3&lt;/span&gt;
      &lt;span class=&quot;metric-label&quot;&gt;por executar&lt;/span&gt;

      &lt;span class=&quot;metric&quot;&gt;0&lt;/span&gt;

    &lt;/article&gt;

  &lt;section id=&quot;diagnostico&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;01 · Auditoria forense&lt;/p&gt;
        &lt;h2&gt;Porque a chamada pareceu não fazer nada&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Evidência de produção + código&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;finding-grid&quot;&gt;
      &lt;article class=&quot;finding p0&quot;&gt;
        &lt;span class=&quot;finding-number&quot;&gt;01&lt;/span&gt;
        &lt;h3&gt;O botão pode falhar sem explicação&lt;/h3&gt;
        &lt;p&gt;Se a conversa ainda não estiver pronta, estiver marcada offline ou não tiver um UUID, o botão fica bloqueado e o clique é ignorado. Não existe texto a explicar o motivo nem ação para recuperar.&lt;/p&gt;
        &lt;small&gt;Correção: estado de prontidão explícito, tooltip, diagnóstico e retry.&lt;/small&gt;
      &lt;/article&gt;
      &lt;article class=&quot;finding p0&quot;&gt;
        &lt;span class=&quot;finding-number&quot;&gt;02&lt;/span&gt;
        &lt;h3&gt;A chamada nasce tarde demais&lt;/h3&gt;
        &lt;p&gt;A implementação pede microfone/câmara antes de criar a sessão durável. Uma permissão lenta, recusada ou indisponível impede que a outra pessoa seja contactada e pode terminar sem uma chamada registada.&lt;/p&gt;
        &lt;small&gt;Correção implementada no worktree: UI imediata → permissão de media → call-start atómico → notificar, sempre com erro visível.&lt;/small&gt;
      &lt;/article&gt;
      &lt;article class=&quot;finding p0&quot;&gt;
        &lt;span class=&quot;finding-number&quot;&gt;03&lt;/span&gt;
        &lt;h3&gt;Push é fire-and-forget&lt;/h3&gt;
        &lt;p&gt;O cliente ignora o resultado do endpoint; erros HTTP são engolidos. Mesmo quando o servidor responde, só sabemos quantos pedidos de push aceitou — não se o dispositivo recebeu ou mostrou o alerta.&lt;/p&gt;
        &lt;small&gt;Correção: outbox + tentativas + ACK apresentado/a tocar por instalação.&lt;/small&gt;
      &lt;/article&gt;
      &lt;article class=&quot;finding p0&quot;&gt;
        &lt;span class=&quot;finding-number&quot;&gt;04&lt;/span&gt;
        &lt;h3&gt;O AudioContext nunca chegava a nascer&lt;/h3&gt;
        &lt;p&gt;&lt;code&gt;#ensureContext()&lt;/code&gt; verificava &lt;code&gt;this.#context?.state !== &#x27;closed&#x27;&lt;/code&gt;. No primeiro toque, o optional chaining produzia &lt;code&gt;undefined&lt;/code&gt;; como &lt;code&gt;undefined !== &#x27;closed&#x27;&lt;/code&gt; é verdadeiro, a função devolvia &lt;code&gt;null&lt;/code&gt; antes de criar o contexto. Resultado: sem ringtone nem ringback, mesmo após um gesto válido.&lt;/p&gt;
        &lt;small&gt;Corrigido em código: guarda explícita &lt;code&gt;this.#context &amp;amp;&amp;amp; …&lt;/code&gt;, prime no gesto, &lt;code&gt;resume()&lt;/code&gt; e testes unitários. A prova física em iOS/Android continua pendente.&lt;/small&gt;
      &lt;/article&gt;
      &lt;article class=&quot;finding p0&quot;&gt;
        &lt;span class=&quot;finding-number&quot;&gt;05&lt;/span&gt;
        &lt;h3&gt;Não há verdade sobre entrega&lt;/h3&gt;
        &lt;p&gt;O chamador vê apenas “A chamar…”; não distingue sessão criada, push enviado, dispositivo contactado, alerta apresentado ou destinatário efetivamente a tocar.&lt;/p&gt;
        &lt;small&gt;Correção: timeline factual e estados derivados de eventos persistidos.&lt;/small&gt;
      &lt;/article&gt;
      &lt;article class=&quot;finding p0&quot;&gt;
        &lt;span class=&quot;finding-number&quot;&gt;06&lt;/span&gt;
        &lt;h3&gt;STUN sem TURN não chega&lt;/h3&gt;
        &lt;p&gt;Produção usa fallback STUN e não tem credenciais TURN configuradas. Redes móveis, CGNAT, firewalls e Wi-Fi restritivo podem impedir áudio/vídeo mesmo depois de atender.&lt;/p&gt;
        &lt;small&gt;Alvo pendente: TURN temporário, política relay privada e métricas ICE; faltam secrets e prova física em produção.&lt;/small&gt;
      &lt;/article&gt;
    &lt;/div&gt;
    &lt;div class=&quot;evidence-strip&quot;&gt;
      &lt;strong&gt;Evidência acumulada · snapshot 2026-07-15&lt;/strong&gt;
      &lt;span&gt;A tentativa original terminou com zero sessões reais: a falha começou antes da entrega.&lt;/span&gt;
      &lt;span&gt;O bug de som foi isolado na condição &lt;code&gt;undefined !== &#x27;closed&#x27;&lt;/code&gt; e coberto por teste.&lt;/span&gt;
      &lt;span&gt;Suite global pós-merge: 61 ficheiros e 427 testes; chat: 82 testes.&lt;/span&gt;
      &lt;span&gt;&lt;code&gt;check&lt;/code&gt;: 0 erros/0 avisos; i18n: 5 idiomas × 4145 chaves.&lt;/span&gt;
      &lt;span&gt;SQL combinado verde em rollback; as 5 migrations foram depois aplicadas individualmente e verificadas em produção.&lt;/span&gt;
      &lt;span&gt;Playwright: 8/8 cenários simulados; não substitui dois aparelhos físicos.&lt;/span&gt;
      &lt;span&gt;Call-start/outboxes estão no backend de produção e o preview passou smoke; TURN, dois aparelhos e frontend final ainda não passaram.&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;benchmark&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;02 · Pesquisa oficial&lt;/p&gt;
        &lt;h2&gt;O que adaptar das melhores apps&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Adaptar padrões, não copiar superfícies&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;table-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;Produto&lt;/th&gt;
            &lt;th&gt;Padrão forte&lt;/th&gt;
            &lt;th&gt;Adaptação Presuntinho&lt;/th&gt;
            &lt;th&gt;Limite/nota&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;th&gt;WhatsApp&lt;/th&gt;
            &lt;td&gt;Controlos de chamada familiares, links de chamada e melhorias públicas de calling.&lt;/td&gt;
            &lt;td&gt;Botões simples; ecrã inteiro; voltar a ligar; primeiro dispositivo a atender ganha.&lt;/td&gt;
            &lt;td&gt;A fonte sustenta os padrões de calling; histórico e multi-device não são inferidos dela. Não prometer lock screen nativo numa PWA.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;th&gt;Signal&lt;/th&gt;
            &lt;td&gt;Distingue contactar de ringing; privacidade e verificação são parte da UX.&lt;/td&gt;
            &lt;td&gt;Só usar “A tocar” após ACK; relay privado e indicador de proteção permanecem alvo explícito.&lt;/td&gt;
            &lt;td&gt;Mais tarde: E2EE verificável de mensagens e media.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;th&gt;Telegram&lt;/th&gt;
            &lt;td&gt;Sincronização cloud multi-dispositivo e continuidade entre aparelhos.&lt;/td&gt;
            &lt;td&gt;Entrega por instalação, ACK por device, answered elsewhere e handoff futuro.&lt;/td&gt;
            &lt;td&gt;“Receive date” não é atribuída ao FAQ; no Presuntinho, o estado durável continua a ser a fonte de verdade.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;th&gt;Discord&lt;/th&gt;
            &lt;td&gt;Estados técnicos visíveis, áudio configurável, controlos persistentes e presença social.&lt;/td&gt;
            &lt;td&gt;Traduzir ICE/RTC em linguagem humana; ringtone/ringback; mini-call ao navegar.&lt;/td&gt;
            &lt;td&gt;Overlay Android e CallKit iOS exigem app nativa.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;th&gt;Zoom&lt;/th&gt;
            &lt;td&gt;Teste de microfone/altifalante e seleção explícita de dispositivos de áudio.&lt;/td&gt;
            &lt;td&gt;Centro “Este dispositivo está pronto?”, teste de áudio, seletor de media e motivos de falha.&lt;/td&gt;
            &lt;td&gt;A fonte citada não sustenta notificações, histórico ou transferência; Focus/DND continuam limitações externas.&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;th&gt;X / Twitter&lt;/th&gt;
            &lt;td&gt;Controlos de chamada simples e explicação clara da privacidade de IP.&lt;/td&gt;
            &lt;td&gt;Voz/vídeo no cabeçalho; mute, speaker, câmara, flip e terminar; TURN por defeito é o alvo, ainda não o estado de produção.&lt;/td&gt;
            &lt;td&gt;Privacidade melhor que o default P2P exposto.&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;source-row&quot; aria-label=&quot;Fontes principais&quot;&gt;
      &lt;a href=&quot;https://about.fb.com/news/2022/12/improved-calling-features-on-whatsapp/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;WhatsApp Calling&lt;/a&gt;
      &lt;a href=&quot;https://support.signal.org/hc/en-us/articles/360007060672-Troubleshooting-Calling&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Signal Call States&lt;/a&gt;

      &lt;a href=&quot;https://support.discord.com/hc/en-us/articles/360041721052-Video-Calls&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Discord Calls&lt;/a&gt;
      &lt;a href=&quot;https://support.zoom.com/hc/en/article?id=zm_kb&amp;amp;sysparm_article=KB0062765&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Zoom Audio Test&lt;/a&gt;
      &lt;a href=&quot;https://help.x.com/en/using-x/direct-messages/audio-video-calls&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;X Calls&lt;/a&gt;
      &lt;a href=&quot;https://webkit.org/blog/13878/web-push-for-web-apps-on-ios-and-ipados/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;WebKit iOS Push&lt;/a&gt;
      &lt;a href=&quot;https://developers.cloudflare.com/realtime/turn/generate-credentials/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Cloudflare TURN&lt;/a&gt;
      &lt;a href=&quot;https://supabase.com/docs/guides/realtime&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Supabase Realtime&lt;/a&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;arquitetura&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;03 · Arquitetura alvo&lt;/p&gt;
        &lt;h2&gt;Uma chamada é uma operação distribuída&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Postgres durável + Realtime + Push + WebRTC&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;architecture&quot; role=&quot;img&quot; aria-label=&quot;Arquitetura da chamada desde o chamador ao destinatário&quot;&gt;
      &lt;div class=&quot;arch-lane caller&quot;&gt;
        &lt;span class=&quot;lane-label&quot;&gt;Chamador&lt;/span&gt;
        &lt;div class=&quot;node&quot;&gt;&lt;b&gt;UI imediata&lt;/b&gt;&lt;small&gt;preparar, cancelar, ringback&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;node&quot;&gt;&lt;b&gt;Permissão de media&lt;/b&gt;&lt;small&gt;microfone/câmara após UI; erro recuperável&lt;/small&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arch-spine&quot;&gt;
        &lt;div class=&quot;node primary&quot;&gt;&lt;b&gt;Call-start atómico · integrado&lt;/b&gt;&lt;small&gt;&lt;code&gt;POST /api/call-start&lt;/code&gt; + &lt;code&gt;client_request_id&lt;/code&gt; → gateway autenticado → &lt;code&gt;start_call_from_gateway&lt;/code&gt;; replay devolve a mesma sessão&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;branch-row&quot;&gt;
          &lt;div class=&quot;node&quot;&gt;&lt;b&gt;Postgres&lt;/b&gt;&lt;small&gt;sessão, devices, eventos, leases&lt;/small&gt;&lt;/div&gt;
          &lt;div class=&quot;node&quot;&gt;&lt;b&gt;Realtime Broadcast&lt;/b&gt;&lt;small&gt;caminho rápido, privado, com ACK&lt;/small&gt;&lt;/div&gt;
          &lt;div class=&quot;node&quot;&gt;&lt;b&gt;Push dispatcher&lt;/b&gt;&lt;small&gt;fanout, retry, stale cleanup&lt;/small&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;node primary&quot;&gt;&lt;b&gt;Event ledger&lt;/b&gt;&lt;small&gt;sent → received → presented → ringing → accepted&lt;/small&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arch-lane callee&quot;&gt;
        &lt;span class=&quot;lane-label&quot;&gt;Destinatário&lt;/span&gt;
        &lt;div class=&quot;node&quot;&gt;&lt;b&gt;Service worker&lt;/b&gt;&lt;small&gt;alerta visível + ACK por instalação&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;node&quot;&gt;&lt;b&gt;Incoming call UI&lt;/b&gt;&lt;small&gt;ringtone, vibração, atender/recusar&lt;/small&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;media-plane&quot;&gt;
        &lt;div&gt;&lt;b&gt;Media plane&lt;/b&gt;&lt;small&gt;WebRTC áudio/vídeo&lt;/small&gt;&lt;/div&gt;
        &lt;span&gt;ICE restart&lt;/span&gt;
        &lt;span&gt;TURN temporário · alvo pendente&lt;/span&gt;
        &lt;span&gt;relay privado · alvo pendente&lt;/span&gt;
        &lt;span&gt;qualidade e reconexão&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;principles&quot;&gt;
      &lt;article&gt;&lt;b&gt;Durável primeiro&lt;/b&gt;&lt;span&gt;Broadcast acelera; nunca substitui a sessão persistida.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Um evento, um significado&lt;/b&gt;&lt;span&gt;Sent, delivered e ringing são factos diferentes.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Por dispositivo&lt;/b&gt;&lt;span&gt;Cada instalação tem identidade, capacidades, last seen e ACKs.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;First answer wins&lt;/b&gt;&lt;span&gt;Atender, recusar e cancelar são transações concorrentes seguras.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Privacidade alvo&lt;/b&gt;&lt;span&gt;TURN + política relay podem evitar exposição de IP; produção ainda precisa de secrets e de ativar essa política.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Observável&lt;/b&gt;&lt;span&gt;Cada falha tem etapa, razão e correlação por call ID.&lt;/span&gt;&lt;/article&gt;
    &lt;/div&gt;
    &lt;p class=&quot;implementation-note&quot;&gt;&lt;strong&gt;Sequência real implementada:&lt;/strong&gt; o clique mostra a UI imediatamente e fixa o request ID; a app pede permissão de microfone/câmara; quando a media fica pronta chama o gateway atómico, que cria ou devolve a mesma sessão durável; depois inicia notificação e sinalização. O backend e as migrations estão em produção e o frontend passou num deploy de preview. TURN privado por defeito continua apenas como alvo: faltam secrets de produção e uma política &lt;code&gt;iceTransportPolicy: &#x27;relay&#x27;&lt;/code&gt; ou preferência equivalente. Merge do frontend e prova em dois aparelhos continuam gates separados.&lt;/p&gt;
    &lt;div class=&quot;source-row&quot; aria-label=&quot;Fontes técnicas da arquitetura&quot;&gt;
      &lt;a href=&quot;https://developers.cloudflare.com/realtime/turn/generate-credentials/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Cloudflare TURN credentials&lt;/a&gt;
      &lt;a href=&quot;https://developers.cloudflare.com/realtime/turn/faq/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Cloudflare TURN FAQ&lt;/a&gt;
      &lt;a href=&quot;https://docs.netlify.com/build/functions/api/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Netlify Functions API&lt;/a&gt;
      &lt;a href=&quot;https://docs.netlify.com/build/functions/background-functions/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Netlify Background Functions&lt;/a&gt;
      &lt;a href=&quot;https://docs.netlify.com/build/functions/scheduled-functions/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Netlify Scheduled Functions&lt;/a&gt;
      &lt;a href=&quot;https://developer.mozilla.org/en-US/docs/Web/API/AudioContext/resume&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;MDN AudioContext.resume()&lt;/a&gt;
      &lt;a href=&quot;https://developer.mozilla.org/en-US/docs/Web/Media/Guides/Autoplay&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;MDN Autoplay&lt;/a&gt;
      &lt;a href=&quot;https://developer.mozilla.org/en-US/docs/Web/API/ServiceWorkerRegistration/showNotification&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;MDN showNotification()&lt;/a&gt;
      &lt;a href=&quot;https://developer.mozilla.org/en-US/docs/Web/API/RTCPeerConnection/restartIce&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;MDN restartIce()&lt;/a&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;estados&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;04 · Máquinas de estado&lt;/p&gt;
        &lt;h2&gt;Textos que só afirmam factos&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Caller e callee sincronizados&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;state-flow&quot; aria-label=&quot;Fluxo principal de estados&quot;&gt;
      &lt;div class=&quot;state active&quot;&gt;&lt;span&gt;1&lt;/span&gt;&lt;b&gt;A preparar&lt;/b&gt;&lt;small&gt;UI já visível; media em validação&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state&quot;&gt;&lt;span&gt;2&lt;/span&gt;&lt;b&gt;A enviar&lt;/b&gt;&lt;small&gt;sessão + outbox criadas&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state&quot;&gt;&lt;span&gt;3&lt;/span&gt;&lt;b&gt;Envio aceite&lt;/b&gt;&lt;small&gt;Realtime/provider aceitou; dispositivo ainda não confirmado&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state&quot;&gt;&lt;span&gt;4&lt;/span&gt;&lt;b&gt;Contactada&lt;/b&gt;&lt;small&gt;received/presented confirma um device real; nunca só HTTP 202&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state&quot;&gt;&lt;span&gt;5&lt;/span&gt;&lt;b&gt;A tocar&lt;/b&gt;&lt;small&gt;ringing confirma som/haptic iniciado no device&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state&quot;&gt;&lt;span&gt;6&lt;/span&gt;&lt;b&gt;Atendeu&lt;/b&gt;&lt;small&gt;claim transacional&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state&quot;&gt;&lt;span&gt;7&lt;/span&gt;&lt;b&gt;A ligar&lt;/b&gt;&lt;small&gt;ICE/DTLS/media&lt;/small&gt;&lt;/div&gt;
      &lt;i aria-hidden=&quot;true&quot;&gt;→&lt;/i&gt;
      &lt;div class=&quot;state success&quot;&gt;&lt;span&gt;8&lt;/span&gt;&lt;b&gt;Ligados&lt;/b&gt;&lt;small&gt;duração + qualidade&lt;/small&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;terminal-grid&quot;&gt;
      &lt;article&gt;&lt;b&gt;Recusada&lt;/b&gt;&lt;span&gt;A outra pessoa recusou; oferecer mensagem rápida.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Não atendida&lt;/b&gt;&lt;span&gt;Expirou depois de pelo menos um dispositivo tocar.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Indisponível&lt;/b&gt;&lt;span&gt;Nenhum dispositivo recebeu; explicar notificações/offline.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Ocupada&lt;/b&gt;&lt;span&gt;Já existe outra sessão ativa; permitir enviar mensagem.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Atendida noutro aparelho&lt;/b&gt;&lt;span&gt;Fechar overlays restantes sem marcar como falha.&lt;/span&gt;&lt;/article&gt;
      &lt;article&gt;&lt;b&gt;Ligação falhou&lt;/b&gt;&lt;span&gt;Mostrar etapa e ação: tentar outra vez, mudar rede ou testar áudio.&lt;/span&gt;&lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;plataformas&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;05 · Contrato por plataforma&lt;/p&gt;
        &lt;h2&gt;O que conseguimos realmente garantir&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Sem promessas falsas de PWA&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;table-wrap&quot;&gt;
      &lt;table class=&quot;capability-table&quot;&gt;

          &lt;tr&gt;
            &lt;th&gt;Cenário&lt;/th&gt;

          &lt;/tr&gt;

  &lt;/section&gt;

  &lt;section id=&quot;execucao&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;06 · Plano executável&lt;/p&gt;
        &lt;h2&gt;Backlog com gates e critérios de aceitação&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;O HTML será atualizado a cada merge&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;filter-bar&quot; role=&quot;group&quot; aria-label=&quot;Filtrar tarefas&quot;&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter active&quot; data-filter=&quot;all&quot;&gt;Todas&lt;/button&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter&quot; data-filter=&quot;p0&quot;&gt;P0&lt;/button&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter&quot; data-filter=&quot;p1&quot;&gt;P1&lt;/button&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter&quot; data-filter=&quot;p2&quot;&gt;P2&lt;/button&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter&quot; data-filter=&quot;done&quot;&gt;Concluídas&lt;/button&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter&quot; data-filter=&quot;active&quot;&gt;Em execução&lt;/button&gt;
      &lt;button type=&quot;button&quot; class=&quot;filter&quot; data-filter=&quot;todo&quot;&gt;Pendentes&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class=&quot;phase-list&quot;&gt;
      &lt;article class=&quot;phase&quot;&gt;
        &lt;div class=&quot;phase-title&quot;&gt;
          &lt;span&gt;Fase A&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Fundação de fiabilidade&lt;/h3&gt;&lt;p&gt;Fazer a chamada existir, chegar e ser observável antes de polir o ecrã.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;task-grid&quot;&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CALL-001&lt;/span&gt;&lt;b&gt;Sessão e outbox atómicas&lt;/b&gt;&lt;p&gt;O gateway &lt;code&gt;/api/call-start&lt;/code&gt; usa &lt;code&gt;client_request_id&lt;/code&gt;, fila antes da criação e replay idempotente.&lt;/p&gt;&lt;small&gt;Duplo clique, timeout ambíguo, resposta perdida e acesso direto ao RPC ficaram cobertos por testes.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CALL-002&lt;/span&gt;&lt;b&gt;Identidade por instalação&lt;/b&gt;&lt;p&gt;Device ID estável, plataforma, capacidades, heartbeat, push endpoint e versão CAS da subscrição.&lt;/p&gt;&lt;small&gt;Provado por matriz SQL, incluindo prefixos literais e rotação de subscrição.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CALL-003&lt;/span&gt;&lt;b&gt;Dispatcher com retry&lt;/b&gt;&lt;p&gt;Fanout Web Push, worker de background, sweep agendado, backoff, TTL e limpeza CAS de endpoints.&lt;/p&gt;&lt;small&gt;Testes de servidor e matriz SQL verdes; deploy continua um gate separado.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CALL-004&lt;/span&gt;&lt;b&gt;ACK real do destinatário&lt;/b&gt;&lt;p&gt;Service worker e app registam received, presented, ringing e opened; ringing exige som ou haptic realmente iniciado.&lt;/p&gt;&lt;small&gt;Tombstones persistentes e ACK tardio estão cobertos por regressão.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CALL-005&lt;/span&gt;&lt;b&gt;First-answer-wins&lt;/b&gt;&lt;p&gt;Accept/decline/cancel transacionais e answered_elsewhere já existem.&lt;/p&gt;&lt;small&gt;Falta o ensaio concorrente em dois aparelhos/multi-tab reais.&lt;/small&gt;&lt;em&gt;Em validação&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CALL-006&lt;/span&gt;&lt;b&gt;Telemetria mínima&lt;/b&gt;&lt;p&gt;Call ID, instalação, tentativa, timestamps, eventos e razões de falha são persistidos sem SDP.&lt;/p&gt;&lt;small&gt;Falta provar reconstrução operacional ponta a ponta em produção.&lt;/small&gt;&lt;em&gt;Em validação&lt;/em&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/article&gt;

      &lt;article class=&quot;phase&quot;&gt;
        &lt;div class=&quot;phase-title&quot;&gt;
          &lt;span&gt;Fase B&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Experiência de tocar e atender&lt;/h3&gt;&lt;p&gt;Feedback imediato para quem liga e presença forte para quem recebe.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;task-grid&quot;&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;UX-001&lt;/span&gt;&lt;b&gt;Overlay imediato do chamador&lt;/b&gt;&lt;p&gt;A fase preparing aparece antes do primeiro await, com pessoa, tipo, progresso e cancelar.&lt;/p&gt;&lt;small&gt;O call-start atómico ainda melhora a recuperação, mas a reação visual já não depende do RPC.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;UX-002&lt;/span&gt;&lt;b&gt;Timeline factual&lt;/b&gt;&lt;p&gt;Preparing, creating, notifying, contacting, ringing, connecting e active vêm da state machine e dos ACKs.&lt;/p&gt;&lt;small&gt;Provider aceite fica em notifying; contacting exige device ACK e “A tocar” exige confirmação factual de ringing.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;UX-003&lt;/span&gt;&lt;b&gt;Ringtone e ringback&lt;/b&gt;&lt;p&gt;Gestor dedicado controla tons, gesto de desbloqueio, mute, vibração e cleanup determinístico.&lt;/p&gt;&lt;small&gt;O bug &lt;code&gt;undefined !== &#x27;closed&#x27;&lt;/code&gt; foi corrigido e testado; falta prova física mobile.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;UX-004&lt;/span&gt;&lt;b&gt;Incoming call expressiva&lt;/b&gt;&lt;p&gt;Overlay total, pulse/ripple, vibração progressiva, foco modal, safe areas e reduced motion.&lt;/p&gt;&lt;small&gt;A validação física iOS/Android continua no gate de dispositivos.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;UX-005&lt;/span&gt;&lt;b&gt;Erros acionáveis&lt;/b&gt;&lt;p&gt;Permissão, offline, conta, ausência de media, ocupado, timeout, entrega e rede têm texto e retry.&lt;/p&gt;&lt;small&gt;Falta fechar Focus/DND e confirmar todas as cópias em dispositivos reais.&lt;/small&gt;&lt;em&gt;Em validação&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;UX-006&lt;/span&gt;&lt;b&gt;Recusar com carinho&lt;/b&gt;&lt;p&gt;Depois de recusar, o destinatário pode enviar “Já te ligo”, “Agora não consigo” ou “Manda mensagem”.&lt;/p&gt;&lt;small&gt;A resposta usa &lt;code&gt;client_id&lt;/code&gt; estável, reconciliação idempotente e estado factual de envio.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/article&gt;

      &lt;article class=&quot;phase&quot;&gt;
        &lt;div class=&quot;phase-title&quot;&gt;
          &lt;span&gt;Fase C&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Media, rede e privacidade&lt;/h3&gt;&lt;p&gt;A chamada atendida tem de ligar em redes reais, não apenas no Wi-Fi de desenvolvimento.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;task-grid&quot;&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;RTC-001&lt;/span&gt;&lt;b&gt;TURN em produção&lt;/b&gt;&lt;p&gt;Endpoint autenticado para credenciais Cloudflare temporárias e fallback configurável já existe.&lt;/p&gt;&lt;small&gt;Não concluída: faltam secrets, relay físico, NAT restritivo e verificação de produção.&lt;/small&gt;&lt;em&gt;Em integração&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;RTC-002&lt;/span&gt;&lt;b&gt;Sinalização resiliente&lt;/b&gt;&lt;p&gt;Sequência, dedupe, retry limitado, presença por dispositivo e reconnect foram implementados.&lt;/p&gt;&lt;small&gt;Falta ensaio Wi-Fi ↔ dados durante negociação.&lt;/small&gt;&lt;em&gt;Em validação&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;RTC-003&lt;/span&gt;&lt;b&gt;ICE restart e reconexão&lt;/b&gt;&lt;p&gt;Estado reconnecting, backoff, restart ICE e timeout distinto de ended estão em código e testes.&lt;/p&gt;&lt;small&gt;Falta recuperar uma quebra transitória num par de aparelhos reais.&lt;/small&gt;&lt;em&gt;Em validação&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;RTC-004&lt;/span&gt;&lt;b&gt;Seletor de dispositivos&lt;/b&gt;&lt;p&gt;Microfone, câmara e saída aparecem durante a chamada, com troca atómica de tracks e fallback factual.&lt;/p&gt;&lt;small&gt;Integração mobile/desktop e browsers sem &lt;code&gt;setSinkId&lt;/code&gt; estão cobertos.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;RTC-005&lt;/span&gt;&lt;b&gt;Qualidade visível&lt;/b&gt;&lt;p&gt;RTT, jitter, perda e bitrate alimentam o indicador boa/instável/fraca e detalhes em linguagem humana.&lt;/p&gt;&lt;small&gt;O monitor corre no peer ativo e também aparece na mini-call.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p2&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;RTC-006&lt;/span&gt;&lt;b&gt;Partilha de ecrã&lt;/b&gt;&lt;p&gt;Desktop com feature detection, consentimento do browser, retorno seguro à câmara e stop automático.&lt;/p&gt;&lt;small&gt;Quando a plataforma não suporta, o controlo não é inventado.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/article&gt;

      &lt;article class=&quot;phase&quot;&gt;
        &lt;div class=&quot;phase-title&quot;&gt;
          &lt;span&gt;Fase D&lt;/span&gt;
          &lt;div&gt;&lt;h3&gt;Prontidão, histórico e operação&lt;/h3&gt;&lt;p&gt;O utilizador consegue saber antes da chamada se o próprio dispositivo está preparado.&lt;/p&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;task-grid&quot;&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;OPS-001&lt;/span&gt;&lt;b&gt;Centro de prontidão&lt;/b&gt;&lt;p&gt;PWA, HTTPS, service worker, push, media, áudio, vibração e rede aparecem nas definições com ações.&lt;/p&gt;&lt;small&gt;Implementado e localizado; Focus/DND continua limitado pelo sistema/browser.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;OPS-002&lt;/span&gt;&lt;b&gt;Teste de chamada/notificação&lt;/b&gt;&lt;p&gt;O centro testa som, vibração, microfone, câmara e um Web Push real deste dispositivo.&lt;/p&gt;&lt;small&gt;Distingue apresentado localmente, aceite pelo provider, em fila e falha; não chama “recebido” a um simples HTTP 202.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;active&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;OPS-003&lt;/span&gt;&lt;b&gt;Histórico rico&lt;/b&gt;&lt;p&gt;Estado, direção, duração e voltar a ligar estão integrados na conversa.&lt;/p&gt;&lt;small&gt;Falta confirmar consistência nos dois utilizadores reais.&lt;/small&gt;&lt;em&gt;Em validação&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;todo&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;OPS-004&lt;/span&gt;&lt;b&gt;Preferências&lt;/b&gt;&lt;p&gt;Ringtone, volume, vibração, previews, DND, quem pode ligar e relay obrigatório.&lt;/p&gt;&lt;small&gt;Gate: defaults seguros e sincronização.&lt;/small&gt;&lt;em&gt;Por executar&lt;/em&gt;&lt;/div&gt;
          &lt;div class=&quot;task&quot; data-priority=&quot;p2&quot; data-status=&quot;todo&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;OPS-005&lt;/span&gt;&lt;b&gt;Handoff de device&lt;/b&gt;&lt;p&gt;Transferir chamada explicitamente entre aparelhos da mesma conta.&lt;/p&gt;&lt;small&gt;Gate: anterior termina como transferred.&lt;/small&gt;&lt;em&gt;Por executar&lt;/em&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;mensagens&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;07 · Mensagens ao nível certo&lt;/p&gt;
        &lt;h2&gt;Backlog inspirado nas apps, adaptado ao casal&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;P1 implementado no worktree; P2 futuro permanece separado&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;task-grid chat-task-grid&quot; aria-label=&quot;Estado das funcionalidades P1 de mensagens&quot;&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CHAT-001&lt;/span&gt;&lt;b&gt;Inbox e organização&lt;/b&gt;&lt;p&gt;Lista de conversas, não lidas, pesquisa, pins, mute, arquivo e previews de drafts.&lt;/p&gt;&lt;small&gt;Integrado na página de mensagens e coberto por testes de preferências/drafts.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CHAT-002&lt;/span&gt;&lt;b&gt;Ações e presença&lt;/b&gt;&lt;p&gt;Reply, edit, delete, reações, typing e sent/read com cursor factual.&lt;/p&gt;&lt;small&gt;Leitura só avança quando o fim real da thread está visível.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CHAT-003&lt;/span&gt;&lt;b&gt;Voice notes e drafts&lt;/b&gt;&lt;p&gt;Gravar, cancelar, ouvir preview, repetir, enviar e manter draft por conversa.&lt;/p&gt;&lt;small&gt;Falhas preservam o rascunho; envio confirmado limpa-o.&lt;/small&gt;&lt;em&gt;Concluída&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CHAT-004&lt;/span&gt;&lt;b&gt;Media e galeria&lt;/b&gt;&lt;p&gt;Foto, vídeo, ficheiro, preview, galeria paginada e URLs locais com revogação individual estão integrados.&lt;/p&gt;&lt;small&gt;Concluído em código; uploads grandes em aparelhos reais continuam no gate físico.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CHAT-005&lt;/span&gt;&lt;b&gt;Offline e idempotência&lt;/b&gt;&lt;p&gt;Outbox global por conta, retry, bootstrap offline, recuperação do commit e descarte seguro evitam duplicados e perda após timeout.&lt;/p&gt;&lt;small&gt;82 testes de chat passaram; reconnect prolongado e produção continuam gates de release.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;todo&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;CHAT-006&lt;/span&gt;&lt;b&gt;Camada avançada&lt;/b&gt;&lt;p&gt;Forward, favoritos, reminders, GIF/stickers e mensagens temporárias.&lt;/p&gt;&lt;small&gt;E2EE verificável permanece um trilho próprio e não está concluído.&lt;/small&gt;&lt;em&gt;Por executar&lt;/em&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;feature-columns&quot;&gt;
      &lt;article&gt;
        &lt;h3&gt;Compor e enviar&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; voice note, cancelar, preview e draft por conta/conversa&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito em código:&lt;/strong&gt; vídeo, foto, ficheiro e câmara; validação física de ficheiros grandes pendente&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; reply, edit e delete/unsend; &lt;strong&gt;futuro:&lt;/strong&gt; forward&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; drafts, outbox por conta e retry offline idempotente&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; GIF, stickers e emoji recentes&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; mensagens temporárias opcionais&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;h3&gt;Ler e encontrar&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; sent, delivered e read por mensagem&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; pesquisa textual; &lt;strong&gt;futuro:&lt;/strong&gt; filtros avançados por autor/data/media&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; deep-link exato e jump-to-message com contexto&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; pins; &lt;strong&gt;futuro:&lt;/strong&gt; favoritos e reminders&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; galeria paginada de links/media/ficheiros&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; inbox e marcador de não lidas&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;h3&gt;Sentir a conversa&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; typing e presença com privacidade&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; reações rápidas, animadas e acessíveis&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; mascote reage a mensagem, amor e saudade&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; foreground cards grandes e fofos&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; sons/haptics distintos; &lt;strong&gt;futuro:&lt;/strong&gt; preferências completas&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Feito:&lt;/strong&gt; reduced motion e mute; &lt;strong&gt;limitado pela plataforma:&lt;/strong&gt; DND/Focus&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/article&gt;
      &lt;article&gt;
        &lt;h3&gt;Segurança&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; E2EE verificável de conteúdo como trilho próprio&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; safety number e gestão de dispositivos ligados&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; preview de links seguro e opt-in&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; malware scanning; limites de ficheiro atuais não equivalem a scanning&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; report/block para contactos gerais&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Futuro:&lt;/strong&gt; retenção configurável e exportação transparente&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pedidos-anteriores&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;08 · Rastreabilidade do pedido completo&lt;/p&gt;
        &lt;h2&gt;Os pedidos anteriores continuam dentro do mesmo produto&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Concluídos no worktree; release continua separada&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;task-grid&quot; aria-label=&quot;Rastreabilidade dos pedidos anteriores do Presuntinho&quot;&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;SOCIAL-001&lt;/span&gt;&lt;b&gt;Multiplayer simples&lt;/b&gt;&lt;p&gt;Procurar amigo e convidar com um clique, ou partilhar/copiar link para entrar na sala.&lt;/p&gt;&lt;small&gt;Aceitação in-app, entrada pelo link, retry, expiração, cancelamento, substituição e limite de dois lugares estão cobertos por 25 testes.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;SOCIAL-002&lt;/span&gt;&lt;b&gt;Convite de jogo durável&lt;/b&gt;&lt;p&gt;Push transacional com destinatário, sala, jogo, validade, autenticação, deep-link e substituição/cancelamento.&lt;/p&gt;&lt;small&gt;O service worker preserva o ramo de convite e a política impede convites após remover amizade.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;COUPLE-001&lt;/span&gt;&lt;b&gt;Outbox de comunicação do casal&lt;/b&gt;&lt;p&gt;Chat, “amo-te” e “tenho saudades” usam entrega durável, retry/sweep, dedupe e payloads redigidos.&lt;/p&gt;&lt;small&gt;O mesmo contrato evita perder estes gestos quando o outro aparelho está offline ou em background.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;MEDIA-001&lt;/span&gt;&lt;b&gt;Eliminação de media fiável&lt;/b&gt;&lt;p&gt;A remoção de anexos passa por outbox com lease, retry seguro e tratamento de caminhos reutilizados.&lt;/p&gt;&lt;small&gt;Falhas permanentes de Storage não entram num ciclo infinito.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p0&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;COUPLE-002&lt;/span&gt;&lt;b&gt;Coração e pontos do casal&lt;/b&gt;&lt;p&gt;O coração só aparece em modo casal, sincronizado nas duas contas pelo mesmo período, acima da mascote e com pontos exclusivos do casal.&lt;/p&gt;&lt;small&gt;O clique produz haptic coordenado nos dois aparelhos sem misturar a pontuação original.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
      &lt;div class=&quot;task&quot; data-priority=&quot;p1&quot; data-status=&quot;done&quot;&gt;&lt;span class=&quot;task-id&quot;&gt;MASCOT-001&lt;/span&gt;&lt;b&gt;Expressividade da mascote&lt;/b&gt;&lt;p&gt;Press-and-hold “amo-te”, multi-tap “saudades” e receção foreground de mensagem, amor ou saudade ganharam reações progressivas e finais visíveis.&lt;/p&gt;&lt;small&gt;Inclui inchar exponencialmente, explosão de corações, intensidade por toque, card fofo e animação da mascote ao receber; a sensação física final continua no device lab.&lt;/small&gt;&lt;em&gt;Concluída em código&lt;/em&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;testes&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;div&gt;
        &lt;p class=&quot;section-kicker&quot;&gt;09 · Matriz de validação&lt;/p&gt;
        &lt;h2&gt;Não está pronto até passar em dois aparelhos reais&lt;/h2&gt;
      &lt;/div&gt;
      &lt;span class=&quot;section-tag&quot;&gt;Automação + device lab manual&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;test-matrix&quot;&gt;
      &lt;div class=&quot;test-axis&quot;&gt;
        &lt;b&gt;Origem&lt;/b&gt;
        &lt;span&gt;iPhone Home Screen&lt;/span&gt;&lt;span&gt;Android PWA&lt;/span&gt;&lt;span&gt;Desktop Chrome&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;test-axis&quot;&gt;
        &lt;b&gt;Destino&lt;/b&gt;
        &lt;span&gt;Foreground&lt;/span&gt;&lt;span&gt;Background&lt;/span&gt;&lt;span&gt;Fechada&lt;/span&gt;&lt;span&gt;Offline&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;test-axis&quot;&gt;
        &lt;b&gt;Rede&lt;/b&gt;
        &lt;span&gt;Mesmo Wi-Fi&lt;/span&gt;&lt;span&gt;Wi-Fi ↔ 4G/5G&lt;/span&gt;&lt;span&gt;NAT restritivo&lt;/span&gt;&lt;span&gt;Troca de rede&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;test-axis&quot;&gt;
        &lt;b&gt;Estado&lt;/b&gt;
        &lt;span&gt;Atende&lt;/span&gt;&lt;span&gt;Recusa&lt;/span&gt;&lt;span&gt;Ignora&lt;/span&gt;&lt;span&gt;Ocupada&lt;/span&gt;&lt;span&gt;Dois devices&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;acceptance&quot;&gt;
      &lt;h3&gt;Critérios de saída P0&lt;/h3&gt;
      &lt;p class=&quot;acceptance-warning&quot;&gt;&lt;strong&gt;Ainda não aprovados:&lt;/strong&gt; TURN/relay em rede restritiva, corrida em dois aparelhos físicos, background/fechada nos dois sistemas e smoke de produção.&lt;/p&gt;
      &lt;ol&gt;
        &lt;li&gt;O overlay do chamador aparece em menos de 100 ms após o clique, independentemente de permissões ou rede.&lt;/li&gt;
        &lt;li&gt;O destinatário com app aberta vê overlay e ouve ringtone; vibra onde a plataforma permite.&lt;/li&gt;
        &lt;li&gt;Em background/fechada, recebe notificação visível quando a plataforma e permissões permitem.&lt;/li&gt;
        &lt;li&gt;O chamador só vê “A tocar” depois de ACK real de um dispositivo.&lt;/li&gt;
        &lt;li&gt;Nenhum device disponível produz “Não conseguimos contactar este dispositivo”, nunca silêncio.&lt;/li&gt;
        &lt;li&gt;Atender em dois devices simultaneamente resulta num vencedor e answered_elsewhere no outro.&lt;/li&gt;
        &lt;li&gt;Áudio e vídeo ligam através de TURN em redes diferentes e recuperam de uma interrupção transitória.&lt;/li&gt;
        &lt;li&gt;Cancelar, recusar, timeout e falha fecham som, vibração, media tracks, notificações e canais.&lt;/li&gt;
        &lt;li&gt;Histórico e duração coincidem para os dois utilizadores.&lt;/li&gt;
        &lt;li&gt;Testes unitários, integração, RLS/advisors, build e smoke production ficam verdes.&lt;/li&gt;
      &lt;/ol&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section release&quot;&gt;
    &lt;div&gt;
      &lt;p class=&quot;section-kicker&quot;&gt;10 · Release gates&lt;/p&gt;
      &lt;h2&gt;Ordem de publicação&lt;/h2&gt;
    &lt;/div&gt;
    &lt;div class=&quot;release-flow&quot;&gt;
      &lt;div class=&quot;done&quot;&gt;&lt;span&gt;1&lt;/span&gt;&lt;b&gt;Migrations verificadas&lt;/b&gt;&lt;small&gt;5 migrations + 5 testes passaram juntos em rollback; as migrations foram depois aplicadas individualmente e confirmadas no ledger de produção.&lt;/small&gt;&lt;/div&gt;
      &lt;i&gt;→&lt;/i&gt;
      &lt;div class=&quot;done&quot;&gt;&lt;span&gt;2&lt;/span&gt;&lt;b&gt;Backend de entrega&lt;/b&gt;&lt;small&gt;Push/outbox/ACK, call-start atómico, RLS, grants, Realtime e instalações push estão ativos em produção; TURN aguarda secrets e política relay.&lt;/small&gt;&lt;/div&gt;
      &lt;i&gt;→&lt;/i&gt;
      &lt;div class=&quot;active&quot;&gt;&lt;span&gt;3&lt;/span&gt;&lt;b&gt;Teste real a dois&lt;/b&gt;&lt;small&gt;Preview verde; pendente: foreground/background/closed e corrida multi-device em dois aparelhos.&lt;/small&gt;&lt;/div&gt;
      &lt;i&gt;→&lt;/i&gt;
      &lt;div&gt;&lt;span&gt;4&lt;/span&gt;&lt;b&gt;Frontend&lt;/b&gt;&lt;small&gt;Pendente: merge main + deploy Netlify.&lt;/small&gt;&lt;/div&gt;
      &lt;i&gt;→&lt;/i&gt;
      &lt;div&gt;&lt;span&gt;5&lt;/span&gt;&lt;b&gt;Verificação produção&lt;/b&gt;&lt;small&gt;Pendente: event ledger, notificação e media por TURN.&lt;/small&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;footer&gt;
    &lt;p&gt;&lt;strong&gt;Documento vivo.&lt;/strong&gt; Cada tarefa muda de estado quando o respetivo gate tem evidência. “Implementado” sem teste real não conta como concluído.&lt;/p&gt;
    &lt;a href=&quot;#presuntinho-communications-plan&quot;&gt;Voltar ao topo ↑&lt;/a&gt;
  &lt;/footer&gt;
&lt;/main&gt;

  (function () {
    var root = document.getElementById(&quot;presuntinho-communications-plan&quot;);
    if (!root) return;
    var buttons = Array.from(root.querySelectorAll(&quot;.filter&quot;));
    var tasks = Array.from(root.querySelectorAll(&quot;.task&quot;));
    function refreshCounts() {
      var done = tasks.filter(function (task) { return task.dataset.status === &quot;done&quot;; }).length;
      var active = tasks.filter(function (task) { return task.dataset.status === &quot;active&quot;; }).length;
      var todo = tasks.filter(function (task) { return task.dataset.status === &quot;todo&quot;; }).length;
      root.querySelector(&quot;#done-count&quot;).textContent = String(done);
      root.querySelector(&quot;#active-count&quot;).textContent = String(active);
      root.querySelector(&quot;#todo-count&quot;).textContent = String(todo);
    }
    buttons.forEach(function (button) {
      button.addEventListener(&quot;click&quot;, function () {
        var filter = button.dataset.filter || &quot;all&quot;;
        buttons.forEach(function (item) { item.classList.toggle(&quot;active&quot;, item === button); });

          var show = filter === &quot;all&quot; || task.dataset.priority === filter || task.dataset.status === filter;
          task.classList.toggle(&quot;hidden&quot;, !show);

      });
    });
    refreshCounts();

    document.removeEventListener(&quot;focusout&quot;, handleLeave);
