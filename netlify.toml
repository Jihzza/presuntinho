# Netlify configuration for Presuntinho.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

# Single Page App — fallback to index.html for any unknown route.
# (Not strictly needed since this is static HTML, but harmless and future-proof.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for assets (CSS, JS, MP3, PNG)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML — always fetch latest
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Pretty URLs
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/downloads"
  to = "/index.html#pg-dl"
  status = 301
