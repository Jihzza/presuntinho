# Netlify configuration for Presuntinho V4 (SvelteKit + Vite).
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback — SvelteKit adapter-static emits a single index.html fallback,
# but the wildcard redirect keeps URLs clean and matches Netlify's expected
# behaviour for client-routed apps.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for immutable Vite/SvelteKit assets (hashed filenames)
[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for legacy static assets (audio, images, css, js)
[[headers]]
  for = "/legacy/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for legacy documents and zip
[[headers]]
  for = "/legacy/docs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/legacy/*.zip"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML — always fetch latest
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# No cache for service worker / manifest — must always revalidate
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers (UNCHANGED from V3 — must persist)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Pretty URL aliases (UNCHANGED from V3)
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/downloads"
  to = "/legacy/index.html#pg-dl"
  status = 301

# Legacy compatibility: old V3 root and page hashes still work
[[redirects]]
  from = "/v3"
  to = "/legacy/index.html"
  status = 301